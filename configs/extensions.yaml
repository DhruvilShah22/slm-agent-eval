# Extension cells (design §9): family generality (llama), size x quant
# factorial completion (3b Q8), and the size axis anchor (7b Q4).
# 6 cells x 25 tasks x 8 seeds = 1,200 episodes.
run_id: ext_v1
ollama_url: http://localhost:11434
seeds: [1, 2, 3, 4, 5, 6, 7, 8]
max_turns: 10
options:
  temperature: 0.7
  top_p: 0.9
  num_ctx: 4096
  num_predict: 512
guardrail:
  max_schema_retries: 2
  max_extra_calls: 4
system_prompt: >-
  You are a support agent for Zephyra Outfitters, an outdoor gear retailer.
  You have tools for the product catalog, order lookups, company policy
  documents, a calculator, and Python. Facts about orders, products, prices,
  stock, policies, fees, and dates MUST come from tool results — never guess
  or invent them. If the request is missing information that no tool can
  provide, ask the user ONE short clarifying question. When you have the
  answer, reply on a single line: 'FINAL ANSWER: <value>' where <value> is
  just the number, date (YYYY-MM-DD), word, or short phrase — no explanation.
cells:
  E1: {model: "llama3.2:1b", condition: baseline}
  E2: {model: "llama3.2:1b", condition: guardrail}
  E3: {model: "qwen2.5:3b-instruct-q8_0", condition: baseline}
  E4: {model: "qwen2.5:3b-instruct-q8_0", condition: guardrail}
  E5: {model: "qwen2.5:7b-instruct-q4_K_M", condition: baseline}
  E6: {model: "qwen2.5:7b-instruct-q4_K_M", condition: guardrail}

# Task suite (design §5): 25 tasks, 5 slices. Golds are RESOLVED from the
# generated world at grading time (grading/gold.py) — never hand-copied.
# allowed_tools: calls outside this set count toward wrong-tool selection.
# required_tools: must each succeed at least once for a grounded answer.
# Run `python -m grading.check_tasks` after any edit to this file.

# ---- S1: single tool -------------------------------------------------------
- id: t01
  slice: S1
  prompt: "A customer buys gear worth $2,840 before tax. What is 7.5% of that
    amount plus a flat fee of $129.99? Use the calculator."
  allowed_tools: [calculator]
  required_tools: [calculator]
  gold: {fn: arith, args: {expr: "0.075*2840+129.99"}, type: number}

- id: t02
  slice: S1
  prompt: "What is the return window, in days, for jackets?"
  allowed_tools: [search_docs]
  required_tools: [search_docs]
  gold: {fn: fact, args: {path: return_window_days.jackets}, type: number}

- id: t03
  slice: S1
  prompt: "What is the current status of order ORD-1011?"
  allowed_tools: [get_order]
  required_tools: [get_order]
  gold: {fn: order_status, args: {order_id: ORD-1011}, type: string}

- id: t04
  slice: S1
  prompt: "How many tent models in our catalog cost at most $300?"
  allowed_tools: [find_products]
  required_tools: [find_products]
  gold: {fn: count_products, args: {category: tents, max_price: 300}, type: number}

- id: t05
  slice: S1
  prompt: "How many calendar days are there between 2026-03-14 and 2026-11-09?
    Compute it with Python."
  allowed_tools: [run_python]
  required_tools: [run_python]
  gold: {fn: days_between, args: {d1: "2026-03-14", d2: "2026-11-09"}, type: number}

# ---- S2: multi-tool chains -------------------------------------------------
- id: t06
  slice: S2
  prompt: "What is the total merchandise value of order ORD-1009 (sum of
    quantity times unit price across its items)?"
  allowed_tools: [get_order, calculator, run_python]
  required_tools: [get_order]
  gold: {fn: order_subtotal, args: {order_id: ORD-1009}, type: number}

- id: t07
  slice: S2
  prompt: "What does order ORD-1002 cost after applying our volume discount
    policy to its merchandise subtotal?"
  allowed_tools: [get_order, search_docs, calculator, run_python]
  required_tools: [get_order, search_docs]
  gold: {fn: order_total_bulk, args: {order_id: ORD-1002}, type: number}

- id: t08
  slice: S2
  prompt: "Which order has the larger merchandise subtotal, ORD-1005 or
    ORD-1025 — and by how many dollars? Answer with the difference."
  allowed_tools: [get_order, calculator, run_python]
  required_tools: [get_order]
  gold: {fn: order_subtotal_diff, args: {a: ORD-1005, b: ORD-1025}, type: number}

- id: t09
  slice: S2
  prompt: "What is the total cost of order ORD-1016 including standard
    shipping to its delivery region?"
  allowed_tools: [get_order, search_docs, calculator, run_python]
  required_tools: [get_order, search_docs]
  gold: {fn: order_total_shipping, args: {order_id: ORD-1016, method: standard}, type: number}

- id: t10
  slice: S2
  prompt: "A customer wants three units of our cheapest in-stock backpack.
    What would that cost in total?"
  allowed_tools: [find_products, calculator, run_python]
  required_tools: [find_products]
  gold: {fn: cheapest_times, args: {category: backpacks, qty: 3}, type: number}

- id: t11
  slice: S2
  prompt: "What is the average price of our in-stock stoves? Round to two
    decimal places."
  allowed_tools: [find_products, calculator, run_python]
  required_tools: [find_products]
  gold: {fn: avg_price_instock, args: {category: stoves}, type: number}

- id: t12
  slice: S2
  prompt: "A customer is returning order ORD-1008 within the return window,
    but the item was opened. Per our return policy, what refund do they
    receive on the merchandise?"
  allowed_tools: [get_order, search_docs, calculator, run_python]
  required_tools: [get_order, search_docs]
  gold: {fn: refund_restocking, args: {order_id: ORD-1008}, type: number}

- id: t13
  slice: S2
  prompt: "By what date is order ORD-1029 due to arrive, given our delivery
    timelines? Business days exclude Saturday and Sunday. Answer YYYY-MM-DD."
  allowed_tools: [get_order, search_docs, run_python, calculator]
  required_tools: [get_order, search_docs]
  gold: {fn: delivery_date, args: {order_id: ORD-1029}, type: date}


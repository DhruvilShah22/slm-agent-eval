# ---- S4: ambiguous / underspecified ----------------------------------------
- id: t18
  slice: S4
  prompt: "A customer asks: how much would standard shipping cost for my
    order?"
  clarification: "The customer says they are in the Prairie region."
  allowed_tools: [search_docs]
  required_tools: [search_docs]
  gold:
    fn: conditional
    asked: {fn: shipping_fee, args: {region: Prairie, method: standard}, type: number}
    default: {fn: fact, args: {path: shipping_fee.Ontario.standard}, type: number}

